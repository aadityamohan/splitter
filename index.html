<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#222831" />
    <meta name="description" content="Split expenses with friends and never forget to collect" />
    <title>Splitter - Expense Tracker</title>
    <!--
      Inline script: apply the .dark class BEFORE React renders to avoid
      a flash of the wrong theme when the user has chosen dark mode.
    -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('splitter-theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark')
          }
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
